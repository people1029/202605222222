<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 - Google Sheets Backend</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .form-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .records-section {
            padding: 30px;
        }

        .records-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .records-header h2 {
            color: #333;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .record-card {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            position: relative;
        }

        .record-card:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .record-card.done {
            opacity: 0.6;
            background: #f8f9fa;
        }

        .record-card.done .record-content {
            text-decoration: line-through;
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .record-category {
            display: inline-block;
            padding: 4px 12px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .record-date {
            color: #999;
            font-size: 0.85em;
        }

        .record-content {
            color: #555;
            line-height: 1.6;
            margin: 10px 0;
            word-wrap: break-word;
        }

        .record-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.85em;
            border-radius: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
            color: #999;
            margin-top: 10px;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #28a745;
        }

        .sync-dot.offline {
            background: #dc3545;
        }

        .sync-dot.syncing {
            background: #ffc107;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .error-message {
            background: #fff3cd;
            color: #856404;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .records-header {
                flex-direction: column;
                gap: 15px;
            }

            .filter-buttons {
                flex-wrap: wrap;
            }

            .btn {
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 留言板</h1>
            <p>分享你的想法與建議</p>
            <div class="sync-status" id="syncStatus">
                <span class="sync-dot syncing" id="syncDot"></span>
                <span id="syncText">正在連接...</span>
            </div>
        </div>

        <div class="form-section">
            <form id="recordForm">
                <div class="form-group">
                    <label for="content">內容 *</label>
                    <textarea id="content" placeholder="請輸入你的留言..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="category">分類</label>
                    <select id="category">
                        <option value="">請選擇分類（可選）</option>
                        <option value="一般">一般</option>
                        <option value="建議">建議</option>
                        <option value="問題">問題</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        ➕ 新增留言
                    </button>
                    <button type="button" class="btn btn-secondary" id="clearBtn">
                        🗑️ 清除
                    </button>
                </div>
            </form>
            <div id="formError" class="error-message" style="display: none;"></div>
        </div>

        <div class="records-section">
            <div class="records-header">
                <h2>📋 所有留言 (<span id="recordCount">0</span>)</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="active">進行中</button>
                    <button class="filter-btn" data-filter="done">已完成</button>
                </div>
            </div>
            <div id="recordsList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>載入中...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ APPS SCRIPT CONNECTOR ============
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzcM8Vgn13JQYTjkrr6PuZdxWy8DPBSSN4JAlPVI-YC3iXg_btvrCLn3Dy4Sr2ZCQuKnw/exec";

        // Sync status DOM elements
        const syncDot = document.getElementById('syncDot');
        const syncText = document.getElementById('syncText');

        function updateSyncStatus(status, text) {
            syncDot.className = 'sync-dot';
            if (status === 'online') syncDot.classList.add('online');
            else if (status === 'offline') syncDot.classList.add('offline');
            else if (status === 'syncing') syncDot.classList.add('syncing');
            syncText.textContent = text;
        }

        /**
         * POST data to Google Apps Script
         */
        async function syncToSheet(payload) {
            updateSyncStatus('syncing', '同步中...');
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.success) {
                    updateSyncStatus('online', '已同步到雲端');
                } else {
                    throw new Error(result.error || '同步失敗');
                }
                return result;
            } catch (error) {
                console.error('syncToSheet error:', error);
                updateSyncStatus('offline', '離線模式 - 儲存在本機');
                throw error;
            }
        }

        /**
         * GET records from Google Apps Script
         */
        async function fetchRecordsFromSheet() {
            updateSyncStatus('syncing', '正在從雲端載入...');
            try {
                const response = await fetch(APPS_SCRIPT_URL);
                const data = await response.json();
                if (data.records && Array.isArray(data.records)) {
                    const normalized = data.records.map(normalizeRecord);
                    updateSyncStatus('online', '已連接雲端');
                    return normalized;
                } else {
                    throw new Error('Invalid records data');
                }
            } catch (error) {
                console.error('fetchRecordsFromSheet error:', error);
                updateSyncStatus('offline', '離線模式 - 使用本機資料');
                throw error;
            }
        }

        /**
         * Normalize Sheet record to frontend key mapping
         */
        function normalizeRecord(record) {
            return {
                id: record.ID || record.id || '',
                createdAt: record.CreatedAt || record.createdAt || new Date().toISOString(),
                status: record.Status || record.status || 'active',
                content: record.Content || record.content || '',
                category: record.Category || record.category || ''
            };
        }

        /**
         * Load records: Sheet first, localStorage fallback
         */
        async function loadRecords() {
            try {
                const sheetRecords = await fetchRecordsFromSheet();
                if (sheetRecords && sheetRecords.length > 0) {
                    records = sheetRecords;
                    // Also update localStorage as cache
                    saveToLocalStorage();
                    return;
                }
            } catch (error) {
                console.warn('Failed to load from Sheet, falling back to localStorage');
            }

            // Fallback to localStorage
            try {
                const localData = localStorage.getItem('boardRecords');
                if (localData) {
                    records = JSON.parse(localData);
                    if (records.length > 0) {
                        updateSyncStatus('offline', '使用本機資料');
                    } else {
                        updateSyncStatus('online', '尚無資料');
                    }
                } else {
                    records = [];
                    updateSyncStatus('online', '尚無資料');
                }
            } catch (error) {
                console.error('localStorage read error:', error);
                records = [];
                updateSyncStatus('offline', '讀取失敗');
            }
        }

        function saveToLocalStorage() {
            try {
                localStorage.setItem('boardRecords', JSON.stringify(records));
            } catch (error) {
                console.error('localStorage write error:', error);
            }
        }

        // ============ APP STATE ============
        let records = [];
        let currentFilter = 'all';
        let editingId = null;

        // ============ DOM ELEMENTS ============
        const recordForm = document.getElementById('recordForm');
        const contentInput = document.getElementById('content');
        const categoryInput = document.getElementById('category');
        const submitBtn = document.getElementById('submitBtn');
        const clearBtn = document.getElementById('clearBtn');
        const recordsList = document.getElementById('recordsList');
        const recordCount = document.getElementById('recordCount');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const formError = document.getElementById('formError');

        // ============ UTILITY FUNCTIONS ============
        function generateId() {
            return 'rec_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return '剛剛';
            if (minutes < 60) return `${minutes} 分鐘前`;
            if (hours < 24) return `${hours} 小時前`;
            if (days < 7) return `${days} 天前`;

            return date.toLocaleDateString('zh-TW', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function showError(message) {
            formError.textContent = message;
            formError.style.display = 'block';
            setTimeout(() => {
                formError.style.display = 'none';
            }, 3000);
        }

        // ============ RENDER ============
        function getFilteredRecords() {
            if (currentFilter === 'all') return records;
            if (currentFilter === 'active') return records.filter(r => r.status === 'active');
            if (currentFilter === 'done') return records.filter(r => r.status === 'done');
            return records;
        }

        function renderRecords() {
            const filtered = getFilteredRecords();
            recordCount.textContent = filtered.length;

            if (filtered.length === 0) {
                recordsList.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3em; margin-bottom: 15px;">📭</div>
                        <p>尚無留言，快來新增第一則吧！</p>
                    </div>
                `;
                return;
            }

            recordsList.innerHTML = filtered.map(record => `
                <div class="record-card ${record.status === 'done' ? 'done' : ''}" data-id="${record.id}">
                    <div class="record-header">
                        <span class="record-category">${record.category || '未分類'}</span>
                        <span class="record-date">${formatDate(record.createdAt)}</span>
                    </div>
                    <div class="record-content">${escapeHtml(record.content)}</div>
                    <div class="record-actions">
                        ${record.status === 'active' ? `
                            <button class="btn btn-success btn-sm" onclick="toggleStatus('${record.id}')">
                                ✅ 標記完成
                            </button>
                            <button class="btn btn-secondary btn-sm" onclick="startEdit('${record.id}')">
                                ✏️ 編輯
                            </button>
                        ` : `
                            <button class="btn btn-secondary btn-sm" onclick="toggleStatus('${record.id}')">
                                🔄 重新開啟
                            </button>
                        `}
                        <button class="btn btn-danger btn-sm" onclick="deleteRecord('${record.id}')">
                            🗑️ 刪除
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============ CRUD OPERATIONS ============
        async function addRecord(content, category) {
            const record = {
                id: generateId(),
                createdAt: new Date().toISOString(),
                status: 'active',
                content: content,
                category: category || ''
            };

            records.unshift(record);
            saveToLocalStorage();
            renderRecords();

            // Sync to Sheet
            try {
                await syncToSheet({ action: 'create', record });
            } catch (error) {
                console.warn('Failed to sync new record to Sheet, saved locally');
            }
        }

        async function toggleStatus(id) {
            const record = records.find(r => r.id === id);
            if (!record) return;

            const newStatus = record.status === 'active' ? 'done' : 'active';
            record.status = newStatus;
            saveToLocalStorage();
            renderRecords();

            // Sync to Sheet
            try {
                await syncToSheet({ action: 'update', id, changes: { status: newStatus } });
            } catch (error) {
                console.warn('Failed to sync status update to Sheet, saved locally');
            }
        }

        function startEdit(id) {
            const record = records.find(r => r.id === id);
            if (!record) return;

            editingId = id;
            contentInput.value = record.content;
            categoryInput.value = record.category || '';
            submitBtn.textContent = '💾 儲存編輯';
            submitBtn.classList.add('btn-success');
            contentInput.focus();

            // Scroll to form
            document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
        }

        async function updateRecord(id, content, category) {
            const record = records.find(r => r.id === id);
            if (!record) return;

            record.content = content;
            record.category = category || '';
            saveToLocalStorage();
            renderRecords();

            // Sync to Sheet
            try {
                await syncToSheet({ action: 'update', id, changes: { content, category: category || '' } });
            } catch (error) {
                console.warn('Failed to sync edit to Sheet, saved locally');
            }
        }

        async function deleteRecord(id) {
            if (!confirm('確定要刪除這則留言嗎？')) return;

            records = records.filter(r => r.id !== id);
            saveToLocalStorage();
            renderRecords();

            // Sync to Sheet
            try {
                await syncToSheet({ action: 'delete', id });
            } catch (error) {
                console.warn('Failed to sync delete to Sheet, saved locally');
            }
        }

        function resetForm() {
            recordForm.reset();
            editingId = null;
            submitBtn.textContent = '➕ 新增留言';
            submitBtn.classList.remove('btn-success');
        }

        // ============ EVENT LISTENERS ============
        recordForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const content = contentInput.value.trim();
            const category = categoryInput.value;

            if (!content) {
                showError('請輸入留言內容');
                return;
            }

            if (editingId) {
                await updateRecord(editingId, content, category);
            } else {
                await addRecord(content, category);
            }

            resetForm();
        });

        clearBtn.addEventListener('click', function() {
            resetForm();
            formError.style.display = 'none';
        });

        filterBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                filterBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderRecords();
            });
        });

        // ============ INITIALIZATION ============
        async function init() {
            updateSyncStatus('syncing', '正在連接...');
            await loadRecords();
            renderRecords();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
